<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMAS Assessment Tool - Mini Web</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --primary-color: #039347; 
            --primary-light: #e6f4ed; 
            --secondary-color: #003193; 
            --secondary-light: #e6eaf4; 
            --bg-color: #f5f7f8;
            --card-color: #ffffff;
            --text-color: #212121;
            --border-color: #cfd8dc;
            --high-color: #c62828;
            --medium-color: #ef6c00;
            --low-color: #c62828;
            --gradient-prospect: linear-gradient(135deg, #039347 0%, #003193 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--card-color);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 20px;
        }

        .prospect-logo {
            display: block;
            margin: 0 auto 15px auto;
            max-height: 65px;
            width: auto;
            object-fit: contain;
        }

        header h1 {
            background: var(--gradient-prospect);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 5px;
        }

        header p {
            color: #455a64;
            font-size: 14px;
            font-weight: 500;
        }

        .page { display: none; }
        .page.active { display: block; }

        /* Sembunyikan semua step-card secara default, hanya tampilkan yang .active */
        .step-card { display: none; }
        .step-card.active { display: block; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--secondary-color); font-size: 14px; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 15px; background-color: #fff; transition: border-color 0.2s; }
        .form-group input:focus { outline: none; border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(3,147,71,0.1); }

        .btn-submit {
            width: 100%;
            background: var(--gradient-prospect);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(3,147,71,0.2);
            transition: all 0.2s;
        }
        .btn-submit:hover { transform: translateY(-1px); box-shadow: 0 6px 15px rgba(3,147,71,0.3); }

        .progress-container { margin-bottom: 25px; }
        .step-counter { font-size: 14px; font-weight: 700; color: var(--secondary-color); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        .progress-bar-bg { width: 100%; background-color: #e2e8f0; height: 8px; border-radius: 10px; overflow: hidden; }
        .progress-bar-fill { height: 100%; background: var(--gradient-prospect); width: 10%; transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

        .instructions {
            padding: 15px;
            background-color: var(--secondary-light);
            border-radius: 8px;
            margin-bottom: 25px;
            font-size: 14px;
            border-left: 5px solid var(--secondary-color);
            color: var(--secondary-color);
        }

        .indicator-card {
            background: #fafafa;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .indicator-title { font-size: 18px; font-weight: 700; color: var(--secondary-color); margin-bottom: 8px; }
        .indicator-desc { font-size: 14px; color: #455a64; margin-bottom: 20px; line-height: 1.5; }
        
        .slider-container {
            display: flex;
            align-items: center;
            gap: 20px;
            background: #ffffff;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }

        .slider-wrapper { flex: 1; display: flex; flex-direction: column; }
        input[type="range"] { width: 100%; accent-color: var(--primary-color); cursor: pointer; height: 8px; border-radius: 5px; }
        .ticks-container { display: flex; justify-content: space-between; padding: 0 2px; margin-top: 8px; }
        .tick-label { font-size: 11px; color: #78909c; width: 20px; text-align: center; font-weight: 500; }
        .score-display { font-size: 26px; font-weight: bold; color: var(--primary-color); min-width: 45px; text-align: right; }
        
        .rubric-guide-box {
            margin-top: 20px;
            padding: 16px;
            background-color: #f1f5f9;
            border-left: 4px solid #b0bec5;
            border-radius: 4px;
            font-size: 13px;
            color: #334155;
            line-height: 1.6;
        }

        .btn-toggle-rubric {
            background: none;
            border: none;
            color: var(--primary-color);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            text-decoration: underline;
        }

        .full-rubric-table { display: none; margin-top: 15px; font-size: 12px; border: 1px solid var(--border-color); border-radius: 6px; overflow: hidden; background: #ffffff; }
        .full-rubric-table table { width: 100%; border-collapse: collapse; }
        .full-rubric-table th, .full-rubric-table td { padding: 12px; text-align: left; vertical-align: top; border-bottom: 1px solid var(--border-color); }
        .full-rubric-table th { background-color: var(--primary-light); color: var(--primary-color); font-weight: 700; }
        .navigation-panel { display: flex; justify-content: space-between; margin-top: 25px; gap: 15px; }
        .btn-nav { padding: 12px 24px; font-size: 14px; font-weight: bold; border-radius: 6px; cursor: pointer; border: none; transition: all 0.2s; }
        .btn-prev { background-color: #cfd8dc; color: #455a64; }
        .btn-prev:hover { background-color: #b0bec5; }
        .btn-next { background-color: var(--primary-color); color: white; margin-left: auto; }
        .btn-next:hover { opacity: 0.9; }

        .capture-area { background: #ffffff; padding: 20px 20px; border-radius: 8px; }
        .result-container { text-align: center; padding: 10px 0; }
        .result-container h2 { font-size: 26px; color: var(--secondary-color); margin-bottom: 5px; }
        .program-highlight { color: var(--primary-color); font-weight: 700; display: block; font-size: 22px; margin-top: 5px; margin-bottom: 5px; }
        .timestamp-display { font-size: 12px; color: #78909c; font-weight: 500; display: block; margin-bottom: 15px; }
        
        .final-score {
            font-size: 64px;
            font-weight: 800;
            margin: 10px 0;
            background: var(--gradient-prospect);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-badge { display: inline-block; padding: 8px 20px; font-weight: bold; border-radius: 50px; color: white; font-size: 15px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 25px; }
        .status-high { background-color: var(--primary-color); }
        .status-medium { background-color: var(--medium-color); }
        .status-low { background-color: var(--high-color); }

        .chart-container {
            position: relative;
            margin: 20px auto 30px auto;
            height: 380px;
            width: 100%;
            max-width: 480px;
            background: #fafafa;
            border-radius: 8px;
            padding: 15px;
            border: 1px solid var(--border-color);
        }

        .result-desc {
            margin-top: 20px;
            font-size: 14px;
            color: #212121;
            text-align: left;
            background: #fafafa;
            padding: 20px;
            border-radius:
