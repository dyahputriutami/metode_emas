<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMAS Assessment Tool - Mini Web</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --primary-color: #2e7d32; --primary-light: #e8f5e9; --secondary-color: #37474f; --bg-color: #f5f7f8; --card-color: #ffffff; --text-color: #212121; --border-color: #cfd8dc; --high-color: #c62828; --medium-color: #ef6c00; --low-color: #c62828; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); line-height: 1.6; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: var(--card-color); padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid var(--primary-light); padding-bottom: 20px; }
        header h1 { color: var(--primary-color); font-size: 24px; margin-bottom: 5px; }
        header p { color: var(--secondary-color); font-size: 14px; }
        .page { display: none; } .page.active { display: block; }
        .form-group { margin-bottom: 20px; } .form-group label { display: block; font-weight: 600; margin-bottom: 6px; color: var(--secondary-color); font-size: 14px; } .form-group input { width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 14px; }
        .btn-submit, .btn-calc { display: block; width: 100%; background-color: var(--primary-color); color: white; border: none; padding: 14px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 25px; text-align: center; }
        .indicator-card { background: #fafafa; border: 1px solid var(--border-color); border-radius: 8px; padding: 20px; margin-bottom: 20px; }
        .indicator-title { font-size: 16px; font-weight: 600; color: var(--primary-color); margin-bottom: 8px; }
        .slider-container { display: flex; align-items: center; gap: 20px; }
        .slider-wrapper { flex: 1; display: flex; flex-direction: column; }
        input[type="range"] { width: 100%; accent-color: var(--primary-color); cursor: pointer; height: 8px; }
        .ticks-container { display: flex; justify-content: space-between; padding: 0 2px; margin-top: 8px; }
        .tick-label { font-size: 11px; color: #78909c; width: 20px; text-align: center; font-weight: 500; }
        .score-display { font-size: 22px; font-weight: bold; color: var(--primary-color); min-width: 40px; text-align: right; }
        .capture-area { background: #ffffff; padding: 10px 20px; }
        .result-container { text-align: center; padding: 10px 0; }
        .final-score { font-size: 64px; font-weight: 800; margin: 10px 0; color: var(--secondary-color); }
        .status-badge { display: inline-block; padding: 8px 20px; font-weight: bold; border-radius: 50px; color: white; margin-bottom: 25px; }
        .status-high { background-color: var(--high-color); }
        .status-medium { background-color: var(--medium-color); }
        .status-low { background-color: var(--low-color); }
        .chart-container { position: relative; margin: 20px auto 30px auto; height: 380px; width: 100%; max-width: 480px; background: #fafafa; border: 1px solid var(--border-color); padding: 15px; }
        .cta-box { margin-top: 35px; background: #f1f8e9; border: 1px dashed var(--primary-color); padding: 25px; text-align: center; border-radius: 10px; }
        .cta-buttons-group { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; margin-top: 15px; }
        .cta-link { padding: 10px 20px; color: white; text-decoration: none; border-radius: 6px; background-color: #25d366; font-weight: bold; }
        .action-buttons { display: flex; justify-content: center; gap: 15px; margin-top: 25px; }
        .btn-action { padding: 12px 24px; font-size: 14px; font-weight: bold; border-radius: 6px; cursor: pointer; border: none; }
        .btn-download { background-color: var(--primary-color); color: white; }
    </style>
</head>
<body>
<div class="container">
    <header><h1>Asesmen Metode EMAS</h1></header>

    <div id="pageForm" class="page active">
        <form onsubmit="event.preventDefault(); switchPage('pageAssess1');">
            <div class="form-group"><label>Nama Lengkap *</label><input type="text" id="inputNama" required></div>
            <div class="form-group"><label>Nama Perusahaan *</label><input type="text" id="inputPerusahaan" required></div>
            <div class="form-group"><label>Nama Program *</label><input type="text" id="inputProgram" required></div>
            <div class="form-group"><label>No HP *</label><input type="tel" id="inputNoHP" required></div>
            <div class="form-group"><label>Email *</label><input type="email" id="inputEmail" required></div>
            <button type="submit" class="btn-submit">Mulai Asesmen &rarr;</button>
        </form>
    </div>

    <script>
        const indicators = ["Dampak Lingkungan", "Dampak Ekonomi", "Dampak Sosial", "Dampak Kesejahteraan", "SROI", "Shared Value", "Keanekaragaman Hayati", "Stakeholder Engagement", "Kedekatan Kewilayahan", "Tata Kelola"];
        for(let i=1; i<=10; i++) {
            document.write(`
                <div id="pageAssess${i}" class="page">
                    <div class="indicator-card">
                        <div class="indicator-title">${i}. ${indicators[i-1]}</div>
                        <div class="slider-container">
                            <div class="slider-wrapper">
                                <input type="range" min="0" max="10" value="0" class="emas-slider" data-index="${i}">
                                <div class="ticks-container">${Array.from({length:11}, (_,k)=>`<span class="tick-label">${k}</span>`).join('')}</div>
                            </div>
                            <span class="score-display" id="val${i}">0</span>
                        </div>
                    </div>
                    <button class="btn-calc" onclick="${i<10 ? `switchPage('pageAssess${i+1}')` : 'calculateFinal()'}">${i<10 ? 'Selanjutnya &rarr;' : 'Hitung Skor EMAS'}</button>
                </div>
            `);
        }
    </script>

    <div id="pageResult" class="page">
        <div id="downloadTarget" class="capture-area">
            <div class="result-container">
                <div class="final-score" id="finalScoreDisplay">0.0</div>
                <span class="status-badge" id="statusBadge">KATEGORI</span>
                <div class="chart-container"><canvas id="emasSpiderChart"></canvas></div>
            </div>
        </div>
        <div class="cta-box">
            <p>Ingin mengoptimalkan performa program Anda?</p>
            <div class="cta-buttons-group">
                <a href="#" class="cta-link">Hubungi via WhatsApp</a>
            </div>
        </div>
        <div class="action-buttons">
            <button class="btn-action btn-download" onclick="downloadResult()">Unduh Hasil</button>
            <button class="btn-action" onclick="location.reload()">Mulai Baru</button>
        </div>
    </div>
</div>

<script>
    function switchPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
    document.querySelectorAll('.emas-slider').forEach(s => s.oninput = () => document.getElementById(`val${s.dataset.index}`).textContent = s.value);

    function calculateFinal() {
        let scores = Array.from(document.querySelectorAll('.emas-slider')).map(s => parseInt(s.value));
        document.getElementById('finalScoreDisplay').textContent = (scores.reduce((a,b)=>a+b, 0)/10).toFixed(1);
        switchPage('pageResult');
        new Chart(document.getElementById('emasSpiderChart'), { type: 'radar', data: { labels: indicators.map(x=>x[0]), datasets: [{ data: scores, borderColor: '#2e7d32' }] } });
    }
    
    function downloadResult() {
        html2canvas(document.getElementById('downloadTarget')).then(c => {
            let a = document.createElement('a'); a.href = c.toDataURL(); a.download = 'Hasil_EMAS.jpg'; a.click();
        });
    }
</script>
</body>
</html>
